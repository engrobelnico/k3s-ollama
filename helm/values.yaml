ollama:
  extraEnv:
    - name: SSL_CERT_DIR
      value: "/etc/ssl/certs"
  volumes:
    - name: host-ca-certs
      hostPath:
        path: /etc/ssl/certs
        type: Directory
  volumeMounts:
    - name: host-ca-certs
      mountPath: /etc/ssl/certs
      readOnly: true

  ollama:
    # Models to pull on startup — choose based on available RAM/CPU
    # llama3.2:3b ~2GB RAM, good for CPU-only
    # mistral:7b ~5GB RAM, better quality
    models:
      pull:
        - llama3.2:3b
    gpu:
      enabled: false
  persistentVolume:
    enabled: true
    size: 20Gi
  resources:
    requests:
      memory: "4Gi"
      cpu: "1000m"
    limits:
      memory: "8Gi"
      cpu: "4000m"
  service:
    type: ClusterIP
    port: 11434

open-webui:
  ollama:
    # Point to the ollama service deployed by this chart
    enabled: false
  ollamaUrls:
    - http://ollama.ollama.svc.cluster.local:11434

  persistence:
    enabled: true
    size: 2Gi

  # Base path for Traefik ingress at /ollama
  extraEnvVars:
    - name: WEBUI_URL
      value: "http://ollama.kube.local"
    # Default chat model — prevents nomic-embed-text from being selected
    - name: DEFAULT_MODELS
      value: "llama3.2:3b"
    # Allow first-user admin signup (used by webui-setup-job)
    - name: ENABLE_SIGNUP
      value: "true"
    # Admin credentials for setup job bootstrap
    - name: WEBUI_ADMIN_EMAIL
      valueFrom:
        secretKeyRef:
          name: open-webui-admin
          key: email
    - name: OPENID_PROVIDER_URL
      value: ""
    # OpenSearch RAG configuration
    - name: RAG_EMBEDDING_ENGINE
      value: "ollama"
    - name: RAG_OLLAMA_BASE_URL
      value: "http://ollama.ollama.svc.cluster.local:11434"
    - name: RAG_EMBEDDING_MODEL
      value: "nomic-embed-text"
    - name: ENABLE_RAG_WEB_SEARCH
      value: "false"
    # OpenSearch as vector store
    - name: VECTOR_DB
      value: "opensearch"
    - name: OPENSEARCH_URI
      value: "https://opensearch.opensearch.svc.cluster.local:9200"
    - name: OPENSEARCH_SSL_VERIFY
      value: "false"
    - name: OPENSEARCH_USERNAME
      valueFrom:
        secretKeyRef:
          name: opensearch-admin-password
          key: username
    - name: OPENSEARCH_PASSWORD
      valueFrom:
        secretKeyRef:
          name: opensearch-admin-password
          key: password

  ingress:
    enabled: false  # We use our own Ingress template

# Admin credentials for Open WebUI bootstrap (webui-setup-job)
webui:
  admin:
    email: "admin@local.k3s"
    password: "Admin@K3s!"  # Change this for production

  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
