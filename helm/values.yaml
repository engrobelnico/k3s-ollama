ollama:
  extraEnv:
    - name: SSL_CERT_DIR
      value: "/etc/ssl/certs"
  volumes:
    - name: host-ca-certs
      hostPath:
        path: /etc/ssl/certs
        type: Directory
  volumeMounts:
    - name: host-ca-certs
      mountPath: /etc/ssl/certs
      readOnly: true

  # Override lifecycle to avoid CrashLoopBackOff when model pull fails due to network issues.
  # The model is already persisted on the PVC; || true ensures the pod starts even if pull fails.
  lifecycle:
    postStart:
      exec:
        command:
          - /bin/sh
          - -c
          - |
            while ! /bin/ollama ps > /dev/null 2>&1; do
              sleep 5
            done
            /bin/ollama pull llama3.2:3b || true
            /bin/ollama pull nomic-embed-text || true

  ollama:
    # Models to pull on startup — choose based on available RAM/CPU
    # llama3.2:3b ~2GB RAM, good for CPU-only
    # mistral:7b ~5GB RAM, better quality
    models:
      pull:
        - llama3.2:3b
    gpu:
      enabled: false
  persistentVolume:
    enabled: true
    size: 20Gi
  resources:
    requests:
      memory: "4Gi"
      cpu: "1000m"
    limits:
      memory: "8Gi"
      cpu: "4000m"
  service:
    type: ClusterIP
    port: 11434

# AnythingLLM configuration
# AUTH_TOKEN secret is created once by Helm on first install and never overwritten.
# To change: kubectl patch secret anythingllm-auth -n ollama --type=merge -p '{"data":{"token":"<base64>"}}'
anythingllm:
  image:
    repository: mintplexlabs/anythingllm
    tag: latest
    pullPolicy: Always

  storage:
    size: 5Gi

  ollama:
    model: "llama3.2:3b"
    embeddingModel: "nomic-embed-text"
    tokenLimit: 4096
    embeddingMaxChunkLength: 8192

  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
