# Entry point: /ollama → Open WebUI (prefix stripped by middleware)
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: ollama-webui
  namespace: ollama
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: ollama.kube.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ollama-open-webui
                port:
                  number: 80