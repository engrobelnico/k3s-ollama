# Traefik middleware: strip /flowise prefix before forwarding to backend
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: stripprefix-flowise
  namespace: {{ .Release.Namespace }}
spec:
  stripPrefix:
    prefixes:
      - /flowise
---
# Entry point: kube.local/flowise → Flowise (RAG on OTEL logs with OpenSearch)
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: flowise-webui
  namespace: {{ .Release.Namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-stripprefix-flowise@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: kube.local
      http:
        paths:
          - path: /flowise
            pathType: Prefix
            backend:
              service:
                name: flowise
                port:
                  number: 3000