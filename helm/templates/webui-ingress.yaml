# Traefik middleware: strip /flowise prefix before forwarding to backend
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: stripprefix-flowise
  namespace: {{ .Release.Namespace }}
spec:
  stripPrefix:
    prefixes:
      - /flowise
---
# Entry point: kube.local/flowise → Flowise (RAG on OTEL logs with OpenSearch)
# Uses IngressRoute for fine-grained routing:
#   /flowise   → strip prefix → Flowise root (serves HTML)
#   /assets, /api, /socket.io → direct pass-through (SPA absolute paths)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: flowise-webui
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - web
  routes:
    # Main entry: strip /flowise prefix then forward to Flowise /
    - match: Host(`kube.local`) && PathPrefix(`/flowise`)
      kind: Rule
      middlewares:
        - name: stripprefix-flowise
      services:
        - name: flowise
          port: 3000
    # SPA assets & API: Flowise HTML references /assets, /api, /socket.io
    # with absolute paths — forward directly without prefix stripping
    - match: Host(`kube.local`) && (PathPrefix(`/assets`) || PathPrefix(`/api`) || PathPrefix(`/socket.io`))
      kind: Rule
      services:
        - name: flowise
          port: 3000