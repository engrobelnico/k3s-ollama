kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: ollama-webui
  namespace: ollama
  annotations:
    # spec.ingressClassName: traefik # This was an incorrect placement for ingressClassName
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: strip-ollama-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: kube.local
      http:
        paths:
          - path: /ollama
            pathType: Prefix
            backend:
              service:
                name: ollama-open-webui
                port:
                  number: 80