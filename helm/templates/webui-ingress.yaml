# Middleware: strip the /ollama prefix before forwarding to Open WebUI
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-ollama-prefix
  namespace: ollama
spec:
  stripPrefix:
    prefixes:
      - /ollama
---
# Main entry point: /ollama → Open WebUI (with prefix stripped)
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: ollama-webui
  namespace: ollama
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: ollama-strip-ollama-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: kube.local
      http:
        paths:
          - path: /ollama
            pathType: Prefix
            backend:
              service:
                name: ollama-open-webui
                port:
                  number: 80
---
# Static assets: SvelteKit generates absolute URLs (/_app, /static, /api, /ws, /manifest.json)
# Route them directly to Open WebUI without stripping
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: ollama-webui-assets
  namespace: ollama
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.priority: "200"
spec:
  ingressClassName: traefik
  rules:
    - host: kube.local
      http:
        paths:
          - path: /_app
            pathType: Prefix
            backend:
              service:
                name: ollama-open-webui
                port:
                  number: 80
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: ollama-open-webui
                port:
                  number: 80
          - path: /manifest.json
            pathType: Exact
            backend:
              service:
                name: ollama-open-webui
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ollama-open-webui
                port:
                  number: 80
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: ollama-open-webui
                port:
                  number: 80
