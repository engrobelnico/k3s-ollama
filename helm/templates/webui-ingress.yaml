# Entry point: kube.local/flowise → Flowise (RAG on OTEL logs with OpenSearch)
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: flowise-webui
  namespace: {{ .Release.Namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: kube.local
      http:
        paths:
          - path: /flowise
            pathType: Prefix
            backend:
              service:
                name: flowise
                port:
                  number: 3000