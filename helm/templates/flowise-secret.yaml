{{- $existing := lookup "v1" "Secret" .Release.Namespace "flowise-auth" -}}
{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: flowise-auth
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    # Created once, never overwritten by Helm/ArgoCD.
    # To rotate: kubectl patch secret flowise-auth -n ollama \
    #   --type=merge -p '{"stringData":{"password":"<newpassword>"}}'
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  username: {{ .Values.flowise.auth.username | quote }}
  password: {{ .Values.flowise.auth.password | quote }}
{{- end }}
