apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: anythingllm-storage
  namespace: {{ .Release.Namespace }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.anythingllm.storage.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anythingllm
  namespace: {{ .Release.Namespace }}
  labels:
    app: anythingllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anythingllm
  template:
    metadata:
      labels:
        app: anythingllm
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: anythingllm
          image: "{{ .Values.anythingllm.image.repository }}:{{ .Values.anythingllm.image.tag }}"
          imagePullPolicy: {{ .Values.anythingllm.image.pullPolicy }}
          ports:
            - containerPort: 3001
          env:
            - name: STORAGE_DIR
              value: /app/server/storage
            - name: AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: anythingllm-auth
                  key: token
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: anythingllm-jwt
                  key: secret
            # LLM: Ollama
            - name: LLM_PROVIDER
              value: ollama
            - name: OLLAMA_BASE_PATH
              value: "http://ollama.{{ .Release.Namespace }}.svc.cluster.local:11434"
            - name: OLLAMA_MODEL_PREF
              value: {{ .Values.anythingllm.ollama.model | quote }}
            - name: OLLAMA_MODEL_TOKEN_LIMIT
              value: {{ .Values.anythingllm.ollama.tokenLimit | quote }}
            # Embeddings: Ollama nomic-embed-text
            - name: EMBEDDING_ENGINE
              value: ollama
            - name: EMBEDDING_BASE_PATH
              value: "http://ollama.{{ .Release.Namespace }}.svc.cluster.local:11434"
            - name: EMBEDDING_MODEL_PREF
              value: {{ .Values.anythingllm.ollama.embeddingModel | quote }}
            - name: EMBEDDING_MODEL_MAX_CHUNK_LENGTH
              value: {{ .Values.anythingllm.ollama.embeddingMaxChunkLength | quote }}
            # Vector DB: LanceDB (built-in, no external dependency)
            - name: VECTOR_DB
              value: lancedb
          volumeMounts:
            - name: storage
              mountPath: /app/server/storage
          resources:
            requests:
              memory: {{ .Values.anythingllm.resources.requests.memory | quote }}
              cpu: {{ .Values.anythingllm.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.anythingllm.resources.limits.memory | quote }}
              cpu: {{ .Values.anythingllm.resources.limits.cpu | quote }}
          readinessProbe:
            httpGet:
              path: /api/ping
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: anythingllm-storage
---
apiVersion: v1
kind: Service
metadata:
  name: anythingllm
  namespace: {{ .Release.Namespace }}
  labels:
    app: anythingllm
spec:
  selector:
    app: anythingllm
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
