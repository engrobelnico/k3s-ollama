apiVersion: batch/v1
kind: CronJob
metadata:
  name: anythingllm-sync
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  schedule: "0 * * * *"   # every hour
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: python:3.11-alpine
              command:
                - python3
                - -c
                - |
                  import urllib.request, urllib.error, json, time, os, ssl, base64, sys
                  from urllib.request import Request
                  from datetime import datetime, timedelta, timezone

                  ALLM  = "http://anythingllm.ollama.svc.cluster.local:3001"
                  OS    = "https://opensearch.opensearch.svc.cluster.local:9200"

                  with open("/allm-auth/token")   as f: TOKEN   = f.read().strip()
                  with open("/os-creds/username") as f: OS_USER = f.read().strip()
                  with open("/os-creds/password") as f: OS_PASS = f.read().strip()

                  ssl_ctx = ssl.create_default_context()
                  ssl_ctx.check_hostname = False
                  ssl_ctx.verify_mode = ssl.CERT_NONE

                  def allm(method, path, data=None, raw_data=None, content_type=None, timeout=60):
                      h = {"Authorization": f"Bearer {TOKEN}", "Accept": "application/json"}
                      if data is not None:
                          raw_data = json.dumps(data).encode()
                          h["Content-Type"] = "application/json"
                      elif content_type:
                          h["Content-Type"] = content_type
                      req = Request(f"{ALLM}{path}", data=raw_data, headers=h, method=method)
                      try:
                          with urllib.request.urlopen(req, timeout=timeout) as r:
                              body = r.read()
                              return json.loads(body) if body else {}
                      except urllib.error.HTTPError as e:
                          body = e.read().decode(errors="replace")
                          print(f"  HTTP {e.code} {method} {path}: {body[:300]}")
                          return {}
                      except Exception as e:
                          print(f"  ERROR {method} {path}: {e}")
                          return {}

                  def os_req(method, path, data=None):
                      creds = base64.b64encode(f"{OS_USER}:{OS_PASS}".encode()).decode()
                      h = {"Authorization": f"Basic {creds}"}
                      raw = None
                      if data is not None:
                          raw = json.dumps(data).encode()
                          h["Content-Type"] = "application/json"
                      req = Request(f"{OS}{path}", data=raw, headers=h, method=method)
                      try:
                          with urllib.request.urlopen(req, context=ssl_ctx, timeout=60) as r:
                              return json.loads(r.read())
                      except urllib.error.HTTPError as e:
                          body = e.read().decode(errors="replace")
                          print(f"  HTTP {e.code} {method} {path}: {body[:300]}")
                          return {}
                      except Exception as e:
                          print(f"  ERROR {method} {path}: {e}")
                          return {}

                  # 0. Get workspace slug
                  ws_resp = allm("GET", "/api/v0/workspaces")
                  workspaces = ws_resp.get("workspaces", [])
                  slug = next((w["slug"] for w in workspaces if w.get("name") == "log-analysis"), None)
                  if not slug:
                      sys.exit("Workspace 'log-analysis' not found — run anythingllm-setup first")
                  print(f"=== Workspace: {slug}")

                  # 1. Detect field layout from sample doc
                  sample = os_req("POST", "/otel-logs-*/_search", {"size": 1})
                  hits_s = sample.get("hits", {}).get("hits", [])
                  if not hits_s:
                      print("No docs in otel-logs-*, skipping."); sys.exit(0)
                  doc = hits_s[0].get("_source", {})
                  body_field = "body" if "body" in doc else "log"
                  sev_field  = "severityText" if "severityText" in doc else "severity"
                  ts_field   = "time" if "time" in doc else ("observedTime" if "observedTime" in doc else "@timestamp")
                  pod_key = next((k for k in doc if "pod" in k and "uid" not in k and "restart" not in k
                                  and k.startswith("resource")), None)
                  ns_key  = next((k for k in doc if "namespace" in k and k.startswith("resource")), None)

                  # 2. Fetch last 2h of logs (max 1000 docs)
                  SINCE_ISO = (datetime.now(timezone.utc) - timedelta(hours=2)).strftime("%Y-%m-%dT%H:%M:%SZ")
                  result = os_req("POST", "/otel-logs-*/_search", {
                      "size": 1000,
                      "sort": [{ts_field: {"order": "desc"}}],
                      "query": {"range": {ts_field: {"gte": SINCE_ISO}}},
                      "_source": [body_field, sev_field, ts_field] + (
                          [pod_key] if pod_key else []) + ([ns_key] if ns_key else [])
                  })
                  hits = result.get("hits", {}).get("hits", [])
                  print(f"=== Got {len(hits)} docs from last 2h (since {SINCE_ISO})")
                  if not hits:
                      print("No new logs in last 2h, skipping."); sys.exit(0)

                  # 3. Build text content
                  lines = []
                  for h in hits:
                      s = h.get("_source", {})
                      ts   = s.get(ts_field, "")
                      sev  = s.get(sev_field, "")
                      pod  = s.get(pod_key, "") if pod_key else ""
                      ns   = s.get(ns_key, "")  if ns_key  else ""
                      body = s.get(body_field, "")
                      if isinstance(body, dict):
                          body = body.get("body", str(body))
                      lines.append(f"[{ts}] [{sev}] [{ns}/{pod}] {body}")
                  content = "\n".join(lines).encode("utf-8")

                  # 4. Upload document with hourly timestamp in filename
                  now_str  = datetime.now(timezone.utc).strftime("%Y%m%dT%H%M")
                  filename = f"otel-logs-{now_str}.txt"
                  boundary = "----AnythingLLMSyncBoundary"
                  parts = (
                      f"--{boundary}\r\n"
                      f'Content-Disposition: form-data; name="file"; filename="{filename}"\r\n'
                      f"Content-Type: text/plain\r\n\r\n"
                  ).encode() + content + f"\r\n--{boundary}--\r\n".encode()

                  print(f"=== Uploading {filename} ({len(lines)} lines)...")
                  upload_resp = allm(
                      "POST", "/api/v0/document/upload",
                      raw_data=parts,
                      content_type=f"multipart/form-data; boundary={boundary}",
                      timeout=120
                  )
                  documents = upload_resp.get("documents", [])
                  if not documents:
                      sys.exit(f"Upload failed: {upload_resp}")
                  doc_location = documents[0].get("location")
                  print(f"    Location: {doc_location}")

                  # 5. Embed into workspace
                  print(f"=== Embedding into workspace '{slug}'...")
                  embed_resp = allm("POST", f"/api/v0/workspace/{slug}/update-embeddings", {
                      "adds": [doc_location], "deletes": []
                  }, timeout=300)
                  print(f"    Embedded: {embed_resp}")

                  # 6. Prune documents older than 24h from workspace
                  # List workspace documents and delete those older than 24h
                  ws_docs_resp = allm("GET", f"/api/v0/workspace/{slug}")
                  ws_docs = ws_docs_resp.get("workspace", {}).get("documents", [])
                  cutoff = (datetime.now(timezone.utc) - timedelta(hours=24)).strftime("%Y%m%dT%H%M")
                  to_delete = []
                  for d in ws_docs:
                      loc = d.get("docpath", "")
                      # filename pattern: custom-docs/otel-logs-YYYYMMDDTHHMM.txt
                      basename = loc.split("/")[-1]
                      if basename.startswith("otel-logs-") and basename < f"otel-logs-{cutoff}.txt":
                          to_delete.append(loc)
                  if to_delete:
                      print(f"=== Pruning {len(to_delete)} old documents from workspace...")
                      prune_resp = allm("POST", f"/api/v0/workspace/{slug}/update-embeddings", {
                          "adds": [], "deletes": to_delete
                      }, timeout=60)
                      print(f"    Pruned: {prune_resp}")
                      for loc in to_delete:
                          fname = loc.split("/")[-1].replace(".txt", "")
                          allm("DELETE", f"/api/v0/document/custom-docs%2F{fname}.txt")

                  print(f"=== Sync complete: {len(lines)} logs uploaded, {len(to_delete)} old docs pruned")
              volumeMounts:
                - name: allm-auth
                  mountPath: /allm-auth
                  readOnly: true
                - name: os-creds
                  mountPath: /os-creds
                  readOnly: true
          volumes:
            - name: allm-auth
              secret:
                secretName: anythingllm-auth
                items:
                  - key: token
                    path: token
            - name: os-creds
              secret:
                secretName: opensearch-admin-password
                items:
                  - key: username
                    path: username
                  - key: password
                    path: password
