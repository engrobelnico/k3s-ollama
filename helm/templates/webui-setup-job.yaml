apiVersion: batch/v1
kind: Job
metadata:
  name: webui-setup
  namespace: {{ .Release.Namespace }}
  annotations:
    # Must run after opensearch-setup-rag and opensearch-reindex-rag (alphabetical order: w > o)
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: python:3.11-alpine
          command:
            - python3
            - -c
            - |
              import urllib.request, urllib.error, json, time, os, ssl, base64
              from urllib.request import Request

              WEBUI = "http://ollama-open-webui.ollama.svc.cluster.local:80"
              OS    = "https://opensearch.opensearch.svc.cluster.local:9200"

              with open("/os-creds/username") as f: OS_USER = f.read().strip()
              with open("/os-creds/password") as f: OS_PASS = f.read().strip()
              with open("/admin/email")        as f: ADMIN_EMAIL = f.read().strip()
              with open("/admin/password")     as f: ADMIN_PASS  = f.read().strip()

              ssl_ctx = ssl.create_default_context()
              ssl_ctx.check_hostname = False
              ssl_ctx.verify_mode = ssl.CERT_NONE

              # ─────────────────────────────────────────────────
              # Helpers
              # ─────────────────────────────────────────────────
              def api(method, url, data=None, headers=None, bearer=None, raw_data=None):
                  h = dict(headers or {})
                  if bearer:
                      h["Authorization"] = f"Bearer {bearer}"
                  if data is not None and isinstance(data, dict):
                      raw_data = json.dumps(data).encode()
                      h.setdefault("Content-Type", "application/json")
                  req = Request(url, data=raw_data, headers=h, method=method)
                  ctx = ssl_ctx if url.startswith("https") else None
                  try:
                      with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                          return json.loads(r.read())
                  except urllib.error.HTTPError as e:
                      body = e.read().decode(errors="replace")
                      print(f"  HTTP {e.code} {method} {url}: {body[:200]}")
                      return {}
                  except Exception as e:
                      print(f"  ERROR {method} {url}: {e}")
                      return {}

              def os_api(method, path, data=None):
                  creds = base64.b64encode(f"{OS_USER}:{OS_PASS}".encode()).decode()
                  return api(method, f"{OS}{path}", data, {"Authorization": f"Basic {creds}"})

              # ─────────────────────────────────────────────────
              # 0. Wait for Open WebUI
              # ─────────────────────────────────────────────────
              print("=== Waiting for Open WebUI...")
              for _ in range(60):
                  try:
                      urllib.request.urlopen(f"{WEBUI}/health", timeout=5)
                      break
                  except Exception:
                      time.sleep(5)
              else:
                  raise SystemExit("Open WebUI not ready after 5 min")
              print("=== Open WebUI ready")

              # ─────────────────────────────────────────────────
              # 1. Sign up as admin (first user) or sign in
              # ─────────────────────────────────────────────────
              print("=== Authenticating as admin...")
              resp = api("POST", f"{WEBUI}/api/v1/auths/signup", {
                  "name": "Admin", "email": ADMIN_EMAIL,
                  "password": ADMIN_PASS, "role": "admin"
              })
              token = resp.get("token")
              if not token:
                  resp = api("POST", f"{WEBUI}/api/v1/auths/signin", {
                      "email": ADMIN_EMAIL, "password": ADMIN_PASS
                  })
                  token = resp.get("token")
              if not token:
                  raise SystemExit(f"Authentication failed: {resp}")
              print(f"=== Authenticated (token ...{token[-8:]})")

              # ─────────────────────────────────────────────────
              # 2. Check / create Knowledge collection "rag-logs"
              # ─────────────────────────────────────────────────
              print("=== Checking existing knowledge collections...")
              kbs = api("GET", f"{WEBUI}/api/v1/knowledge/", bearer=token)
              kb_id = None
              if isinstance(kbs, list):
                  for k in kbs:
                      if k.get("name") == "rag-logs":
                          kb_id = k["id"]
                          print(f"=== Knowledge 'rag-logs' already exists: {kb_id}")
                          break

              if not kb_id:
                  print("=== Creating knowledge collection 'rag-logs'...")
                  kb = api("POST", f"{WEBUI}/api/v1/knowledge/create", {
                      "name": "rag-logs",
                      "description": "Kubernetes OTel logs for RAG log analysis"
                  }, bearer=token)
                  kb_id = kb.get("id")
                  if not kb_id:
                      raise SystemExit(f"Failed to create knowledge base: {kb}")
                  print(f"=== Created knowledge base: {kb_id}")

                  # ────────────────────────────────────────────
                  # 3. Fetch 500 most recent docs from rag-logs
                  # ────────────────────────────────────────────
                  print("=== Fetching documents from rag-logs OpenSearch index...")
                  result = os_api("POST", "/rag-logs/_search", {
                      "size": 500,
                      "sort": [{"timestamp": {"order": "desc", "missing": "_last"}}],
                      "_source": ["text_chunk", "pod", "namespace", "container", "log_level", "timestamp"]
                  })
                  hits = result.get("hits", {}).get("hits", [])
                  print(f"    Found {len(hits)} documents in rag-logs")

                  if hits:
                      lines = []
                      for hit in hits:
                          s = hit.get("_source", {})
                          ts  = s.get("timestamp", "")
                          lvl = s.get("log_level", "")
                          txt = s.get("text_chunk", "")
                          lines.append(f"[{ts}] [{lvl}] {txt}")
                      content = "\n".join(lines).encode()

                      # Upload as text file (multipart form-data)
                      boundary = "----WebuiSetupBoundary12345"
                      parts = (
                          f"--{boundary}\r\n"
                          f'Content-Disposition: form-data; name="file"; filename="rag-logs.txt"\r\n'
                          f"Content-Type: text/plain\r\n\r\n"
                      ).encode() + content + (
                          f"\r\n--{boundary}--\r\n"
                      ).encode()

                      print(f"=== Uploading {len(hits)} log chunks to Open WebUI...")
                      file_resp = api(
                          "POST", f"{WEBUI}/api/v1/files/",
                          headers={
                              "Content-Type": f"multipart/form-data; boundary={boundary}",
                              "Authorization": f"Bearer {token}"
                          },
                          raw_data=parts
                      )
                      file_id = file_resp.get("id")
                      if file_id:
                          add_resp = api("POST", f"{WEBUI}/api/v1/knowledge/{kb_id}/file/add",
                              {"file_id": file_id}, bearer=token)
                          print(f"=== File added to knowledge base: status={add_resp.get('status', 'ok')}")
                      else:
                          print(f"  WARNING: File upload failed: {file_resp}")
                  else:
                      print("  WARNING: rag-logs index empty — run reindex job first, then re-sync")

              # ─────────────────────────────────────────────────
              # 4. Create / update "Log Analyst" model
              # ─────────────────────────────────────────────────
              print("=== Creating 'Log Analyst' custom model...")
              model_payload = {
                  "id": "log-analyst",
                  "name": "Log Analyst",
                  "base_model_id": "llama3.2:3b",
                  "params": {
                      "system": (
                          "You are a Kubernetes log analyst. "
                          "You have access to OTel logs collected from the cluster. "
                          "Answer questions about errors, pod restarts, performance issues, "
                          "and system behaviour based on the log context provided. "
                          "Always reference the pod name, namespace, and timestamp when citing logs."
                      )
                  },
                  "meta": {
                      "description": "llama3.2:3b pre-loaded with rag-logs knowledge base",
                      "knowledge": [{"id": kb_id, "name": "rag-logs", "type": "collection"}]
                  }
              }
              # Try create first, fall back to update
              model_resp = api("POST", f"{WEBUI}/api/v1/models/create", model_payload, bearer=token)
              if not model_resp.get("id"):
                  model_resp = api("POST", f"{WEBUI}/api/v1/models/", model_payload, bearer=token)
              print(f"=== Model: {model_resp.get('id', model_resp)}")

              print("")
              print("=== Open WebUI setup complete!")
              print(f"    Knowledge base : rag-logs ({kb_id})")
              print( "    Model          : Log Analyst (llama3.2:3b + rag-logs)")
              print( "    Default model  : llama3.2:3b (via DEFAULT_MODELS env var)")
              print( "    Usage          : Select 'Log Analyst' in Open WebUI and ask questions")
          volumeMounts:
            - name: os-creds
              mountPath: /os-creds
              readOnly: true
            - name: admin
              mountPath: /admin
              readOnly: true
      volumes:
        - name: os-creds
          secret:
            secretName: opensearch-admin-password
            items:
              - key: username
                path: username
              - key: password
                path: password
        - name: admin
          secret:
            secretName: open-webui-admin
            items:
              - key: email
                path: email
              - key: password
                path: password
