{{- $existing := lookup "v1" "Secret" .Release.Namespace "open-webui-admin" -}}
{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: open-webui-admin
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    # This secret is created once and never updated by Helm/ArgoCD.
    # Manage password manually: kubectl patch secret open-webui-admin -n ollama \
    #   --type=merge -p '{"data":{"password":"<echo -n PASS | base64>"}}'  
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  email: {{ .Values.webui.admin.email | quote }}
  # Initial password — change via kubectl after first deploy, never store in values.yaml
  password: "Admin@K3s!"
{{- end }}
