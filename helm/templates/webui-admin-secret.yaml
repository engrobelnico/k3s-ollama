{{- $existing := lookup "v1" "Secret" .Release.Namespace "anythingllm-auth" -}}
{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: anythingllm-auth
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    # This secret is created once and never updated by Helm/ArgoCD.
    # Rotate token: kubectl patch secret anythingllm-auth -n ollama \
    #   --type=merge -p '{"data":{"token":"<echo -n TOKEN | base64>"}}'
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # Initial API token — change via kubectl after first deploy
  token: "AnythingLLM@K3s!"
{{- end }}
