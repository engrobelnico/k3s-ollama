---
# One-shot Job: reindex last 24h of otel-logs into rag-logs with embeddings
apiVersion: batch/v1
kind: Job
metadata:
  name: opensearch-reindex-rag
  namespace: {{ .Release.Namespace }}
  annotations:
    # Runs after setup job — trigger manually or adjust hook name
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: reindex
          image: curlimages/curl:8.7.1
          command:
            - /bin/sh
            - -c
            - |
              OS="https://opensearch.opensearch.svc.cluster.local:9200"
              USER=$(cat /credentials/username)
              PASS=$(cat /credentials/password)
              CURL="curl -sk -u ${USER}:${PASS}"

              echo "=== Waiting for rag-logs index to exist..."
              until $CURL "${OS}/rag-logs" -o /dev/null; do sleep 10; done

              # Compute timestamps for last 7 days
              NOW=$(date -u +%s)
              SINCE=$(( NOW - 7 * 86400 ))
              SINCE_MS=$(( SINCE * 1000 ))

              echo "=== Reindexing otel-logs-* → rag-logs (since ${SINCE_MS} ms epoch)..."
              $CURL -X POST "${OS}/_reindex?wait_for_completion=false&requests_per_second=100" \
                -H "Content-Type: application/json" -d "{
                  \"conflicts\": \"proceed\",
                  \"source\": {
                    \"index\": \"otel-logs-*\",
                    \"query\": {
                      \"range\": {
                        \"@timestamp\": {\"gte\": ${SINCE_MS}}
                      }
                    },
                    \"_source\": [\"@timestamp\", \"log.body\", \"resource.attributes.k8s.pod.name\",
                                  \"resource.attributes.k8s.namespace.name\",
                                  \"resource.attributes.k8s.container.name\",
                                  \"severity\"]
                  },
                  \"dest\": {
                    \"index\": \"rag-logs\",
                    \"pipeline\": \"rag-embedding-pipeline\"
                  },
                  \"script\": {
                    \"lang\": \"painless\",
                    \"source\": \"
                      String body = ctx.containsKey('log') && ctx['log'].containsKey('body') ? ctx['log']['body'].toString() : '';
                      String pod   = ctx.containsKey('resource') && ctx['resource'].containsKey('attributes') ? ctx['resource']['attributes'].getOrDefault('k8s.pod.name', '') : '';
                      String ns    = ctx.containsKey('resource') && ctx['resource'].containsKey('attributes') ? ctx['resource']['attributes'].getOrDefault('k8s.namespace.name', '') : '';
                      String ctr   = ctx.containsKey('resource') && ctx['resource'].containsKey('attributes') ? ctx['resource']['attributes'].getOrDefault('k8s.container.name', '') : '';
                      ctx.text_chunk     = '[' + ns + '/' + pod + '/' + ctr + '] ' + body;
                      ctx.timestamp      = ctx['@timestamp'];
                      ctx.pod            = pod;
                      ctx.namespace      = ns;
                      ctx.container      = ctr;
                      ctx.log_level      = ctx.containsKey('severity') ? ctx['severity'] : 'UNKNOWN';
                      ctx.source_index   = ctx['_index'];
                      ctx.remove('@timestamp');
                      ctx.remove('log');
                      ctx.remove('resource');
                      ctx.remove('severity');
                    \"
                  }
                }" | python3 -m json.tool 2>/dev/null || true

              echo ""
              echo "=== Reindex submitted asynchronously."
              echo "    Monitor: $CURL '${OS}/_tasks?actions=*reindex&detailed'"

              # Check doc count after a delay
              sleep 30
              COUNT=$($CURL "${OS}/rag-logs/_count" | grep -o '"count":[0-9]*' | cut -d: -f2)
              echo "    rag-logs current doc count: ${COUNT}"
          volumeMounts:
            - name: credentials
              mountPath: /credentials
              readOnly: true
      volumes:
        - name: credentials
          secret:
            secretName: opensearch-admin-password
            items:
              - key: username
                path: username
              - key: password
                path: password
---
# CronJob: reindex last 2h incrementally every hour
apiVersion: batch/v1
kind: CronJob
metadata:
  name: opensearch-reindex-rag-incremental
  namespace: {{ .Release.Namespace }}
spec:
  schedule: "0 * * * *"   # every hour
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: reindex
              image: curlimages/curl:8.7.1
              command:
                - /bin/sh
                - -c
                - |
                  OS="https://opensearch.opensearch.svc.cluster.local:9200"
                  USER=$(cat /credentials/username)
                  PASS=$(cat /credentials/password)
                  CURL="curl -sk -u ${USER}:${PASS}"

                  # Last 2h window to catch any backlog
                  NOW=$(date -u +%s)
                  SINCE_MS=$(( (NOW - 7200) * 1000 ))

                  echo "=== Incremental reindex otel-logs-* → rag-logs (last 2h)..."
                  $CURL -X POST "${OS}/_reindex?requests_per_second=50" \
                    -H "Content-Type: application/json" -d "{
                      \"conflicts\": \"proceed\",
                      \"source\": {
                        \"index\": \"otel-logs-*\",
                        \"query\": {
                          \"range\": {
                            \"@timestamp\": {\"gte\": ${SINCE_MS}}
                          }
                        },
                        \"_source\": [\"@timestamp\", \"log.body\",
                                      \"resource.attributes.k8s.pod.name\",
                                      \"resource.attributes.k8s.namespace.name\",
                                      \"resource.attributes.k8s.container.name\",
                                      \"severity\"]
                      },
                      \"dest\": {
                        \"index\": \"rag-logs\",
                        \"pipeline\": \"rag-embedding-pipeline\"
                      },
                      \"script\": {
                        \"lang\": \"painless\",
                        \"source\": \"
                          String body = ctx.containsKey('log') && ctx['log'].containsKey('body') ? ctx['log']['body'].toString() : '';
                          String pod   = ctx.containsKey('resource') && ctx['resource'].containsKey('attributes') ? ctx['resource']['attributes'].getOrDefault('k8s.pod.name', '') : '';
                          String ns    = ctx.containsKey('resource') && ctx['resource'].containsKey('attributes') ? ctx['resource']['attributes'].getOrDefault('k8s.namespace.name', '') : '';
                          String ctr   = ctx.containsKey('resource') && ctx['resource'].containsKey('attributes') ? ctx['resource']['attributes'].getOrDefault('k8s.container.name', '') : '';
                          ctx.text_chunk   = '[' + ns + '/' + pod + '/' + ctr + '] ' + body;
                          ctx.timestamp    = ctx['@timestamp'];
                          ctx.pod          = pod;
                          ctx.namespace    = ns;
                          ctx.container    = ctr;
                          ctx.log_level    = ctx.containsKey('severity') ? ctx['severity'] : 'UNKNOWN';
                          ctx.source_index = ctx['_index'];
                          ctx.remove('@timestamp');
                          ctx.remove('log');
                          ctx.remove('resource');
                          ctx.remove('severity');
                        \"
                      }
                    }" -o /dev/null
                  echo "Done."
              volumeMounts:
                - name: credentials
                  mountPath: /credentials
                  readOnly: true
          volumes:
            - name: credentials
              secret:
                secretName: opensearch-admin-password
                items:
                  - key: username
                    path: username
                  - key: password
                    path: password
