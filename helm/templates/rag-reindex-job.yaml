---
# One-shot Job: reindex last 24h of otel-logs into rag-logs with embeddings
apiVersion: batch/v1
kind: Job
metadata:
  name: opensearch-reindex-rag
  namespace: {{ .Release.Namespace }}
  annotations:
    # Runs after setup job (wave 1)
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "2"
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: reindex
          image: python:3.11-alpine
          command:
            - python3
            - -c
            - |
              import urllib.request, urllib.error, json, time, ssl, base64, sys
              from urllib.request import Request

              OS = "https://opensearch.opensearch.svc.cluster.local:9200"
              with open("/credentials/username") as f: USER = f.read().strip()
              with open("/credentials/password") as f: PASS = f.read().strip()

              ssl_ctx = ssl.create_default_context()
              ssl_ctx.check_hostname = False
              ssl_ctx.verify_mode = ssl.CERT_NONE

              def os_req(method, path, data=None):
                  creds = base64.b64encode(f"{USER}:{PASS}".encode()).decode()
                  h = {"Authorization": f"Basic {creds}"}
                  raw = None
                  if data is not None:
                      raw = json.dumps(data).encode()
                      h["Content-Type"] = "application/json"
                  req = Request(f"{OS}{path}", data=raw, headers=h, method=method)
                  try:
                      with urllib.request.urlopen(req, context=ssl_ctx, timeout=120) as r:
                          return json.loads(r.read())
                  except urllib.error.HTTPError as e:
                      body = e.read().decode(errors="replace")
                      print(f"  HTTP {e.code} {method} {path}: {body[:400]}")
                      return {}
                  except Exception as e:
                      print(f"  ERROR {method} {path}: {e}")
                      return {}

              # ─────────────────────────────────────────────────
              # 0. Wait for rag-logs index
              # ─────────────────────────────────────────────────
              print("=== Waiting for rag-logs index...")
              for _ in range(60):
                  r = os_req("GET", "/rag-logs")
                  if "rag-logs" in r:
                      break
                  time.sleep(10)
              else:
                  sys.exit("rag-logs index not found after 10 min")

              # ─────────────────────────────────────────────────
              # 1. Sample a document to detect actual field layout
              # ─────────────────────────────────────────────────
              print("=== Sampling otel-logs-* to detect field layout...")
              sample = os_req("POST", "/otel-logs-*/_search", {"size": 1})
              hits = sample.get("hits", {}).get("hits", [])
              if not hits:
                  sys.exit("No documents found in otel-logs-* — pipeline not writing logs yet")
              doc = hits[0].get("_source", {})
              print(f"    Sample doc keys: {list(doc.keys())}")

              # Detect body field
              body_field = "body" if "body" in doc else "log"
              # Detect severity field
              sev_field = "severityText" if "severityText" in doc else ("severity" if "severity" in doc else "severityText")
              # Detect timestamp field (data-prepper uses 'time', raw OTel uses '@timestamp')
              ts_field = "time" if "time" in doc else ("observedTime" if "observedTime" in doc else "@timestamp")
              # Detect resource field names — data-prepper flattens k8s.x.y as k8s@x@y
              pod_key = next((k for k in doc if "pod" in k and "uid" not in k and "restart" not in k
                              and k.startswith("resource")), None)
              ns_key  = next((k for k in doc if "namespace" in k and k.startswith("resource")), None)
              ctr_key = next((k for k in doc if "container" in k and "restart" not in k
                              and k.startswith("resource")), None)
              print(f"    body={body_field}, sev={sev_field}, ts={ts_field}")
              print(f"    pod_key={pod_key}, ns_key={ns_key}, ctr_key={ctr_key}")

              # ─────────────────────────────────────────────────
              # 2. Count source docs
              # ─────────────────────────────────────────────────
              import time as _time
              SINCE_MS = int(_time.time() * 1000) - 7 * 86400 * 1000
              count_resp = os_req("POST", "/otel-logs-*/_count", {
                  "query": {"range": {ts_field: {"gte": SINCE_MS}}}
              })
              src_count = count_resp.get("count", 0)
              print(f"    Source docs (last 7d): {src_count}")
              if src_count == 0:
                  print("  WARNING: No docs in last 7 days — reindexing all")
                  SINCE_MS = 0

              # Build Painless script — all doc fields via ctx['_source'], NOT ctx
              # pipeline is bypassed via dest.pipeline="_none" so we only map text fields
              src = "ctx['_source']"
              if body_field == "log":
                  body_expr = f"{src}.containsKey('log') && {src}['log'] instanceof Map ? {src}['log'].getOrDefault('body', '').toString() : ''"
              else:
                  body_expr = f"{src}.containsKey('body') ? {src}['body'].toString() : ''"

              pod_expr = f"{src}.containsKey('{pod_key}') ? {src}['{pod_key}'].toString() : ''" if pod_key else "''"
              ns_expr  = f"{src}.containsKey('{ns_key}') ? {src}['{ns_key}'].toString() : ''"  if ns_key  else "''"
              ctr_expr = f"{src}.containsKey('{ctr_key}') ? {src}['{ctr_key}'].toString() : ''" if ctr_key else "''"
              sev_expr = f"{src}.containsKey('{sev_field}') ? {src}['{sev_field}'].toString() : 'UNKNOWN'"
              ts_expr  = f"{src}.containsKey('{ts_field}') ? {src}['{ts_field}'].toString() : ''"

              painless = (
                  f"def src = ctx['_source']; "
                  f"String body = {body_expr}; "
                  f"String pod = {pod_expr}; "
                  f"String ns = {ns_expr}; "
                  f"String ctr = {ctr_expr}; "
                  f"String sev = {sev_expr}; "
                  f"String ts = {ts_expr}; "
                  "src.text_chunk = '[' + ns + '/' + pod + '/' + ctr + '] ' + body; "
                  "src.timestamp = ts; "
                  "src.pod = pod; src.namespace = ns; src.container = ctr; "
                  "src.log_level = sev; src.source_index = ctx['_index']; "
              )

              # ─────────────────────────────────────────────────
              # 3. Synchronous reindex — bypass default pipeline
              #    (rag-embedding-pipeline needs ingest node / ML node;
              #     webui-setup-job only needs text_chunk, not vectors)
              # ─────────────────────────────────────────────────
              query = {"range": {ts_field: {"gte": SINCE_MS}}} if SINCE_MS > 0 else {"match_all": {}}
              print("=== Starting reindex otel-logs-* → rag-logs (synchronous, no pipeline)...")
              result = os_req("POST", "/_reindex?requests_per_second=50", {
                  "conflicts": "proceed",
                  "source": {
                      "index": "otel-logs-*",
                      "size": 100,
                      "query": query
                  },
                  "dest": {
                      "index": "rag-logs",
                      "pipeline": "_none"   # bypass default_pipeline to avoid ingest node requirement
                  },
                  "script": {"lang": "painless", "source": painless}
              })
              print(f"    Reindex result: total={result.get('total',0)}, created={result.get('created',0)}, "
                    f"updated={result.get('updated',0)}, failures={len(result.get('failures',[]))}")
              if result.get("failures"):
                  for f in result["failures"][:5]:
                      print(f"    Failure: {f}")

              count = os_req("GET", "/rag-logs/_count").get("count", 0)
              print(f"=== rag-logs doc count: {count}")
              if count == 0:
                  sys.exit("Reindex produced 0 documents — check failures above")
              print("=== Reindex complete.")
          volumeMounts:
            - name: credentials
              mountPath: /credentials
              readOnly: true
      volumes:
        - name: credentials
          secret:
            secretName: opensearch-admin-password
            items:
              - key: username
                path: username
              - key: password
                path: password
---
# CronJob: reindex last 2h incrementally every hour
apiVersion: batch/v1
kind: CronJob
metadata:
  name: opensearch-reindex-rag-incremental
  namespace: {{ .Release.Namespace }}
spec:
  schedule: "0 * * * *"   # every hour
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: reindex
              image: python:3.11-alpine
              command:
                - python3
                - -c
                - |
                  import urllib.request, urllib.error, json, time, ssl, base64, sys
                  from urllib.request import Request

                  OS = "https://opensearch.opensearch.svc.cluster.local:9200"
                  with open("/credentials/username") as f: USER = f.read().strip()
                  with open("/credentials/password") as f: PASS = f.read().strip()

                  ssl_ctx = ssl.create_default_context()
                  ssl_ctx.check_hostname = False
                  ssl_ctx.verify_mode = ssl.CERT_NONE

                  def os_req(method, path, data=None):
                      creds = base64.b64encode(f"{USER}:{PASS}".encode()).decode()
                      h = {"Authorization": f"Basic {creds}"}
                      raw = None
                      if data is not None:
                          raw = json.dumps(data).encode()
                          h["Content-Type"] = "application/json"
                      req = Request(f"{OS}{path}", data=raw, headers=h, method=method)
                      try:
                          with urllib.request.urlopen(req, context=ssl_ctx, timeout=120) as r:
                              return json.loads(r.read())
                      except urllib.error.HTTPError as e:
                          body = e.read().decode(errors="replace")
                          print(f"  HTTP {e.code} {method} {path}: {body[:300]}")
                          return {}
                      except Exception as e:
                          print(f"  ERROR {method} {path}: {e}")
                          return {}

                  SINCE_MS = int(time.time() * 1000) - 7200 * 1000

                  # Detect field layout from a sample doc
                  sample = os_req("POST", "/otel-logs-*/_search", {"size": 1})
                  hits = sample.get("hits", {}).get("hits", [])
                  if not hits:
                      print("No docs in otel-logs-*, skipping."); sys.exit(0)
                  doc = hits[0].get("_source", {})
                  body_field = "body" if "body" in doc else "log"
                  sev_field  = "severityText" if "severityText" in doc else "severity"
                  ts_field   = "time" if "time" in doc else ("observedTime" if "observedTime" in doc else "@timestamp")
                  pod_key = next((k for k in doc if "pod" in k and "uid" not in k and "restart" not in k
                                  and k.startswith("resource")), None)
                  ns_key  = next((k for k in doc if "namespace" in k and k.startswith("resource")), None)
                  ctr_key = next((k for k in doc if "container" in k and "restart" not in k
                                  and k.startswith("resource")), None)

                  src = "ctx['_source']"
                  if body_field == "log":
                      body_expr = f"{src}.containsKey('log') && {src}['log'] instanceof Map ? {src}['log'].getOrDefault('body', '').toString() : ''"
                  else:
                      body_expr = f"{src}.containsKey('body') ? {src}['body'].toString() : ''"
                  pod_expr = f"{src}.containsKey('{pod_key}') ? {src}['{pod_key}'].toString() : ''" if pod_key else "''"
                  ns_expr  = f"{src}.containsKey('{ns_key}') ? {src}['{ns_key}'].toString() : ''"  if ns_key  else "''"
                  ctr_expr = f"{src}.containsKey('{ctr_key}') ? {src}['{ctr_key}'].toString() : ''" if ctr_key else "''"
                  sev_expr = f"{src}.containsKey('{sev_field}') ? {src}['{sev_field}'].toString() : 'UNKNOWN'"
                  ts_expr  = f"{src}.containsKey('{ts_field}') ? {src}['{ts_field}'].toString() : ''"

                  painless = (
                      f"def src = ctx['_source']; "
                      f"String body = {body_expr}; "
                      f"String pod = {pod_expr}; "
                      f"String ns = {ns_expr}; "
                      f"String ctr = {ctr_expr}; "
                      f"String sev = {sev_expr}; "
                      f"String ts = {ts_expr}; "
                      "src.text_chunk = '[' + ns + '/' + pod + '/' + ctr + '] ' + body; "
                      "src.timestamp = ts; "
                      "src.pod = pod; src.namespace = ns; src.container = ctr; "
                      "src.log_level = sev; src.source_index = ctx['_index']; "
                  )

                  print("=== Incremental reindex otel-logs-* → rag-logs (last 2h, no pipeline)...")
                  result = os_req("POST", "/_reindex?requests_per_second=50", {
                      "conflicts": "proceed",
                      "source": {
                          "index": "otel-logs-*",
                          "size": 100,
                          "query": {"range": {ts_field: {"gte": SINCE_MS}}}
                      },
                      "dest": {
                          "index": "rag-logs",
                          "pipeline": "_none"  # bypass default_pipeline (no ingest node needed)
                      },
                      "script": {"lang": "painless", "source": painless}
                  })
                  print(f"    created={result.get('created',0)} updated={result.get('updated',0)} failures={len(result.get('failures',[]))}")
                  print("Done.")
              volumeMounts:
                - name: credentials
                  mountPath: /credentials
                  readOnly: true
          volumes:
            - name: credentials
              secret:
                secretName: opensearch-admin-password
                items:
                  - key: username
                    path: username
                  - key: password
                    path: password
