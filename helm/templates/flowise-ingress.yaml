---
# Entry point: flowise.kube.local → Flowise (RAG on OTEL logs with OpenSearch)
# Flowise SPA uses createBrowserRouter with basename:"" so it MUST be served at root /
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flowise-webui
  namespace: {{ .Release.Namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: flowise.kube.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flowise
                port:
                  number: 3000