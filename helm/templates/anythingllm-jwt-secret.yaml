{{- $existing := lookup "v1" "Secret" .Release.Namespace "anythingllm-jwt" -}}
{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: anythingllm-jwt
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    # This secret is created once and never updated by Helm/ArgoCD.
    # JWT_SECRET is required by AnythingLLM to sign session tokens.
    # Rotate: kubectl patch secret anythingllm-jwt -n ollama \
    #   --type=merge -p '{"data":{"secret":"<echo -n SECRET | base64>"}}'
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  secret: "AnythingLLMJWT@K3s!SecretKey2024"
{{- end }}
